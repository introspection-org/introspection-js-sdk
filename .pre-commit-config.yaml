# =============================================================================
# prek — Git hooks for Introspection JS SDK (Rust-based, no Python required)
# =============================================================================
# Install: brew install j178/tap/prek && prek install
# Run manually: prek run --all-files
# =============================================================================

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-json
      - id: check-merge-conflict

  # Formatting and linting (matches CI and `pnpm pre-commit`)
  - repo: local
    hooks:
      - id: prettier
        name: Prettier format check
        entry: pnpm format:check
        language: system
        files: \.(ts|tsx|md)$
        pass_filenames: false

      - id: eslint
        name: ESLint
        entry: pnpm lint
        language: system
        files: \.(ts|tsx|js|jsx)$
        pass_filenames: false

      - id: typescript-check
        name: TypeScript type check
        entry: pnpm check-types
        language: system
        files: \.(ts|tsx)$
        pass_filenames: false
