name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    environment: build
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  lint-actions:
    name: Lint GitHub Actions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run actionlint
        uses: raven-actions/actionlint@v2

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Run linting
        run: pnpm lint

      - name: Run type checking
        run: pnpm check-types

  test:
    name: Unit Tests
    needs: lint
    runs-on: ubuntu-latest
    environment: test
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Run tests with coverage
        run: pnpm --filter introspection-tests test:cov
        env:
          POLLY_MODE: replay

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: tests/coverage/
          retention-days: 7

  # Examples live in their own workflow (./examples.yml) so they don't burn
  # LLM tokens on every push. They run on `workflow_dispatch` + tag pushes.

  # ── Create release tag (only on VERSION change) ────────────────────
  create-tag:
    name: Create release tag
    needs: [lint-actions, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: build
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.GH_APP_ID || secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: introspection-org
          repositories: introspection-js-sdk

      - uses: actions/checkout@v7
        with:
          fetch-depth: 2
          token: ${{ steps.app-token.outputs.token }}

      - name: Check if VERSION changed
        id: check
        run: |
          if git diff HEAD~1 --name-only | grep -q '^VERSION$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$(tr -d '[:space:]' < version.txt)" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.check.outputs.changed == 'true'
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          TAG="v${VERSION}"

          if git tag -l "${TAG}" | grep -q .; then
            echo "Tag ${TAG} already exists, skipping."
            exit 0
          fi

          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
          echo "Created and pushed tag ${TAG}"
